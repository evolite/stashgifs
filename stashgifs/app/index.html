<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=2, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="StashGifs">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="shortcut icon" href="favicon.svg" />
    <link rel="apple-touch-icon" href="apple-touch-icon.svg" />
    <meta name="theme-color" content="#000000" />
    <link rel="manifest" crossorigin="use-credentials" href="manifest.json" />
    <title>StashGifs | Stash</title>
    <!-- Seems to be required to make the Dark Reader extension detect the site as having a dark mode -->
    <meta name="color-scheme" content="light dark" />
    <style>
      :root {
        --color-bg: #000000;
        --color-surface: #000000;
        --color-surface-secondary: #000000;
        --color-separator: #000000;
        --color-accent: #000000;
      }
      html { visibility: hidden; }
      html, body { background-color: #000000; margin: 0; padding: 0; }
    </style>
    <!-- Feed UI: placed before the inline script so the script runs only after feed.css is render-blocking-loaded, preventing FOUC -->
    <link rel="stylesheet" href="./assets/feed.css">
    <script>
      (function () {
        var r = document.documentElement;
        try {
          var s = localStorage.getItem('stashgifs-settings');
          if (s) {
            var settings = JSON.parse(s);
            function normalizeHex(v, fb) {
              if (!v) return fb;
              var t = v.trim();
              var n = t.charAt(0) === '#' ? t : '#' + t;
              return /^#[0-9a-fA-F]{6}$/.test(n) ? n.toUpperCase() : fb;
            }
            function toRgba(hex, alpha) {
              var v = hex.replace('#', '');
              return 'rgba(' + parseInt(v.slice(0, 2), 16) + ', ' + parseInt(v.slice(2, 4), 16) + ', ' + parseInt(v.slice(4, 6), 16) + ', ' + alpha + ')';
            }
            function darkenHex(hex, f) {
              var v = hex.replace('#', '');
              var r = Math.round(parseInt(v.slice(0, 2), 16) * (1 - f));
              var g = Math.round(parseInt(v.slice(2, 4), 16) * (1 - f));
              var b = Math.round(parseInt(v.slice(4, 6), 16) * (1 - f));
              return '#' + r.toString(16).padStart(2, '0') + g.toString(16).padStart(2, '0') + b.toString(16).padStart(2, '0');
            }
            var bg      = normalizeHex(settings.themeBackground, '#000000');
            var primary = normalizeHex(settings.themePrimary,    '#000000');
            var second  = normalizeHex(settings.themeSecondary,  '#000000');
            var accent  = normalizeHex(settings.themeAccent,     '#000000');
            r.style.setProperty('--color-bg',              bg);
            r.style.setProperty('--color-surface',         primary);
            r.style.setProperty('--color-surface-secondary', second);
            r.style.setProperty('--color-bg-overlay',      toRgba(bg, 0.96));
            r.style.setProperty('--color-accent',          accent);
            r.style.setProperty('--color-accent-strong',   darkenHex(accent, 0.15));
            r.style.setProperty('--color-accent-weak',     toRgba(accent, 0.18));
            r.style.setProperty('--color-accent-weaker',   toRgba(accent, 0.1));
            r.style.setProperty('--color-text-primary',    '#E6EEF4');
            r.style.setProperty('--color-text-secondary',  '#B4C0C9');
            r.style.setProperty('--color-text-muted',      '#8A99A6');
            r.style.setProperty('--color-separator',       '#3A4A55');
            r.style.backgroundColor = bg;
            var tm = document.querySelector('meta[name="theme-color"]');
            if (tm) tm.setAttribute('content', bg);
            r.dataset.stashgifsThemeReady = 'true';
          }
        } catch (e) {}
        r.style.visibility = 'visible';
      })();
    </script>
    <link rel="modulepreload" href="./assets/index.js">
    <script type="module" src="./assets/index.js"></script>
  </head>
  <body>
    <div id="app" class="feed-container">
      <div class="feed-scroll-container">
        <div class="feed-posts">
          <!-- Content will be loaded by JavaScript -->
        </div>
      </div>
    </div>
  </body>
</html>
